<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 100px; }
    input { padding: 10px; margin: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h2>🔐 Admin Login</h2>
  <input type="password" id="adminPassword" placeholder="Admin Passwort">
  <br>
  <button onclick="login()">Login</button>

  <script>
    function login() {
      const password = document.getElementById('adminPassword').value;
      localStorage.setItem('adminToken', password);

      // Testversuch: Adminseite mit Token laden
      fetch('./admin.html', {
        headers: {
          'Authorization': 'Bearer ' + password
        }
      })
      .then(res => {
        if (!res.ok) throw new Error('Falsches Passwort oder Zugriff verweigert');
        return res.text();
      })
      .then(html => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch(err => {
        alert(err.message);
      });
    }
  </script>
</body>
</html>
