<body>

    </div>

  <h1>Produkt hinzufügen</h1>

  <form id="productForm">
    <label>Produktname:<br>
      <input type="text" name="name" required>
    </label><br><br>

    <label>Beschreibung:<br>
      <textarea name="description" required></textarea>
    </label><br><br>

    <label>Preis (z. B. 9.99):<br>
      <input type="number" name="price" step="0.01" required>
    </label><br><br>

    <button type="submit">Produkt speichern</button>
  </form>

  <p id="message"></p>
  
  <h1>Produktübersicht</h1>
  <div id="product-list"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById('productForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      const response = await fetch('/api/products/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (result.success) {
        message.textContent = "✅ Produkt erfolgreich gespeichert!";
        form.reset();
        loadProducts(); // aktualisiert die Liste nach dem Speichern
      } else {
        message.textContent = "❌ Fehler beim Speichern.";
      }
    });
  });
  </script>
</body>
</html>
