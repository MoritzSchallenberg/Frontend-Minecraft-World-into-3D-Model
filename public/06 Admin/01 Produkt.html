<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrintYourGame – Dein Game-Welt-Druck</title>
  <link rel="stylesheet" href="style.css" />
  
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fff;
      color: #333;
    }
    header {
      background-color: #000;
      color: white;
      padding: 10px 20px;
      font-size: 14px;
      text-align: center;
    }
    .top-bar {
      background-color: #000;
      color: white;
      padding: 5px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .top-bar a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }
    .main-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: white;
      border-bottom: 1px solid #eee;
      position: relative;
    }
    .main-nav img {
      height: 50px;
    }
    .nav-links {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      color: black;
      text-decoration: none;
      font-weight: 500;
    }
    .nav-links a:hover {
      text-decoration: underline;
    }
    .nav-icons {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .nav-icons img {
      width: 22px;
      height: 22px;
      cursor: pointer;
    }
    .game-circles {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 30px 20px;
      border-bottom: 1px solid #ddd;
      background: url('games-bg.jpg') center/cover no-repeat;
    }
    .circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      backdrop-filter: blur(2px);
    }
    .circle:hover {
      transform: scale(1.1);
      cursor: pointer;
    }
    .slider {
      position: relative;
      width: 100%;
      height: 700px;
      overflow: hidden;
    }
    .label {
      position: absolute;
      top: 35px;
      left: 20px;
      z-index: 1;
      color: white;
      font-size: 20px;
      pointer-events: none;
    }
    a.circle-link {
      position: absolute;
      display: block;
      width: 120px;
      height: 120px;
      top: 0;
      left: 0;
      z-index: 2;
    }
    .slides {
      display: flex;
      width: 300%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }
    .slides img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .slider button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      z-index: 1;
    }
    .prev {
      left: 10px;
    }
    .next {
      right: 10px;
    }
    .product-container {
      display: flex;
      flex-wrap: wrap;
      padding: 60px 10%;
      gap: 40px;
    }
    .product-images, .product-info {
      flex: 1;
      min-width: 300px;
    }
    .product-images img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .stars {
      color: gold;
      font-size: 20px;
      margin-bottom: 10px;
    }
    .product-info h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .product-price {
      font-size: 24px;
      color: #000;
      margin: 10px 0;
    }
    .product-options label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
    }
    .product-options select {
      padding: 8px;
      width: 100%;
      max-width: 300px;
    }
    .add-to-cart {
      margin-top: 25px;
      padding: 12px 25px;
      background-color: #000;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .product-description {
      margin-top: 30px;
      line-height: 1.6;
    }
    .section {
      padding: 40px 10%;
      gap: 30px;
      background-color: #f9f9f9;
    }
    .section h2 {
      margin-bottom: 20px;
      font-size: 24px;
    }
    .comments, .similar-products, .popular-products {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .comment {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #eee;
    }
    .product-heading {
      background-color: #f9f9f9;
      padding: 20px 10%;
      font-size: 24px;
      font-weight: bold;
      text-align: left;
    }
    .product-listing {
      padding: 0 10% 40px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
      background-color: #f9f9f9;
    }
    .product-item {
      background-color: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-align: center;
    }
    .product-item img {
      width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .product-item h4 {
      margin: 10px 0 5px;
    }
    .product-item p {
      color: #777;
      font-size: 14px;
    }
    .footer {
      background-color: #000;
      color: white;
      padding: 60px 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .footer-section {
      flex: 1;
      min-width: 200px;
      margin-bottom: 20px;
    }
    .footer-section h4 {
      margin-bottom: 15px;
      font-size: 16px;
    }
    .footer-section a {
      display: block;
      color: white;
      text-decoration: none;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .footer-section a:hover {
      text-decoration: underline;
    }
    .newsletter input[type="email"] {
      padding: 10px;
      width: 70%;
      border: none;
      margin-right: 10px;
    }
    .newsletter button {
      padding: 10px;
      border: none;
      background-color: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    .chatbot-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: #000;
      color: white;
      font-size: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div class="main-nav">
    <img src="logo.png" alt="PrintYourGame Logo" />
    <div class="nav-links">
      <a href="../admin.html">Overview</a>
      <a href="01 Produkt.html">Produkt</a>
      <a href="02 Kunden.html">Kunden</a>
      <a href="03 Bestellungen.html">Bestellungen</a>
      <a href="04 Versand&Steuern.html">Versand & Steuern</a>
      <a href="05 Partnerstores.html">Partnerstores</a>
    </div>
    <div>
      <span>Admin Login</span>
    </div>
  </div>
  
  <h1>Neues Produkt hinzufügen</h1>

  <form id="productForm">
    <label>Produktname:<br>
      <input type="text" name="name" required>
    </label><br><br>

    <label>Beschreibung:<br>
      <textarea name="description" required></textarea>
    </label><br><br>

    <label>Preis (z. B. 9.99):<br>
      <input type="number" name="price" step="0.01" required>
    </label><br><br>

    <button type="submit">Produkt speichern</button>
  </form>

  <p id="message"></p>
  
  <h1>Produktübersicht</h1>
  <div id="product-list"></div>
  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById('productForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      const response = await fetch('/api/products/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (result.success) {
        message.textContent = "✅ Produkt erfolgreich gespeichert!";
        form.reset();
        loadProducts(); // aktualisiert die Liste nach dem Speichern
      } else {
        message.textContent = "❌ Fehler beim Speichern.";
      }
    });

    // Produkte laden & anzeigen
    async function loadProducts() {
      const container = document.getElementById("product-list");
      container.innerHTML = "";
      try {
        const res = await fetch("/api/products");
        const data = await res.json();
        data.forEach(product => {
          const el = document.createElement("div");
          el.classList.add("product-item");
          el.innerHTML = `<h3>${product.name}</h3><p>${product.description}</p><strong>${product.price} €</strong>`;
          container.appendChild(el);
        });
      } catch (err) {
        console.error("Fehler beim Laden der Produkte:", err);
        container.innerHTML = "<p style='color:red;'>Fehler beim Laden der Produkte.</p>";
      }
    }
    loadProducts(); // beim Seitenladen aufrufen
  });
  </script>
</body>
</html>
