<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrintYourGame – Dein Game-Welt-Druck</title>
  <link rel="stylesheet" href="style.css" />
  
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fff;
      color: #333;
    }
    header {
      background-color: #000;
      color: white;
      padding: 10px 20px;
      font-size: 14px;
      text-align: center;
    }
    .top-bar {
      background-color: #000;
      color: white;
      padding: 5px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .top-bar a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }
    .main-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: white;
      border-bottom: 1px solid #eee;
      position: relative;
    }
    .main-nav img {
      height: 50px;
    }
    .nav-links {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      color: black;
      text-decoration: none;
      font-weight: 500;
    }
    .nav-links a:hover {
      text-decoration: underline;
    }
    .nav-icons {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .nav-icons img {
      width: 22px;
      height: 22px;
      cursor: pointer;
    }
    .game-circles {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 30px 20px;
      border-bottom: 1px solid #ddd;
      background: url('games-bg.jpg') center/cover no-repeat;
    }
    .circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      backdrop-filter: blur(2px);
    }
    .circle:hover {
      transform: scale(1.1);
      cursor: pointer;
    }
    .slider {
      position: relative;
      width: 100%;
      height: 700px;
      overflow: hidden;
    }
    .label {
      position: absolute;
      top: 35px;
      left: 20px;
      z-index: 1;
      color: white;
      font-size: 20px;
      pointer-events: none;
    }
    a.circle-link {
      position: absolute;
      display: block;
      width: 120px;
      height: 120px;
      top: 0;
      left: 0;
      z-index: 2;
    }
    .slides {
      display: flex;
      width: 300%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }
    .slides img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .slider button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      z-index: 1;
    }
    .prev {
      left: 10px;
    }
    .next {
      right: 10px;
    }
    .product-container {
      display: flex;
      flex-wrap: wrap;
      padding: 60px 10%;
      gap: 40px;
    }
    .product-images, .product-info {
      flex: 1;
      min-width: 300px;
    }
    .product-images img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .stars {
      color: gold;
      font-size: 20px;
      margin-bottom: 10px;
    }
    .product-info h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .product-price {
      font-size: 24px;
      color: #000;
      margin: 10px 0;
    }
    .product-options label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
    }
    .product-options select {
      padding: 8px;
      width: 100%;
      max-width: 300px;
    }
    .add-to-cart {
      margin-top: 25px;
      padding: 12px 25px;
      background-color: #000;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .product-description {
      margin-top: 30px;
      line-height: 1.6;
    }
    .section {
      padding: 40px 10%;
      gap: 30px;
      background-color: #f9f9f9;
    }
    .section h2 {
      margin-bottom: 20px;
      font-size: 24px;
    }
    .comments, .similar-products, .popular-products {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .comment {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #eee;
    }
    .product-heading {
      background-color: #f9f9f9;
      padding: 20px 10%;
      font-size: 24px;
      font-weight: bold;
      text-align: left;
    }
    .product-listing {
      padding: 0 10% 40px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
      background-color: #f9f9f9;
    }
    .product-item {
      background-color: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-align: center;
    }
    .product-item img {
      width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .product-item h4 {
      margin: 10px 0 5px;
    }
    .product-item p {
      color: #777;
      font-size: 14px;
    }
    .footer {
      background-color: #000;
      color: white;
      padding: 60px 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .footer-section {
      flex: 1;
      min-width: 200px;
      margin-bottom: 20px;
    }
    .footer-section h4 {
      margin-bottom: 15px;
      font-size: 16px;
    }
    .footer-section a {
      display: block;
      color: white;
      text-decoration: none;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .footer-section a:hover {
      text-decoration: underline;
    }
    .newsletter input[type="email"] {
      padding: 10px;
      width: 70%;
      border: none;
      margin-right: 10px;
    }
    .newsletter button {
      padding: 10px;
      border: none;
      background-color: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    .chatbot-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: #000;
      color: white;
      font-size: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 1000;
    }
    .cart-overlay {
      position: fixed;
      top: 0;
      right: -100%;
      width: 320px;
      height: 100%;
      background: white;
      box-shadow: -2px 0 10px rgba(0,0,0,0.3);
      transition: right 0.3s ease;
      z-index: 9999;
      padding: 20px;
      overflow-y: auto;
    }

  </style>
  
  <script>
  function toggleFavorit(button) {
    const produktDiv = button.closest(".product-item");
    const produktId = produktDiv.dataset.id;
    const produktKategorie = produktDiv.dataset.kategorie;
    const produktHtml = produktDiv.outerHTML;

    let favoriten = JSON.parse(localStorage.getItem("favoriten")) || [];

    const index = favoriten.findIndex(p => p.id === produktId);
    if (index !== -1) {
      favoriten.splice(index, 1);
    } else {
      favoriten.push({ id: produktId, kategorie: produktKategorie, html: produktHtml });
    }

    localStorage.setItem("favoriten", JSON.stringify(favoriten));
    alert("Favorit gespeichert!");
  }
  </script>
  
  <script>
  function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existing = cart.find(item => item.name === name);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({ name, price, quantity: 1 });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount(); // damit Icon-Zahl sich aktualisiert
    alert(name + " wurde dem Warenkorb hinzugefügt!");
  }
  </script>
  
  <script>
    let currentSlide = 0;
    function showSlide(index) {
      const slides = document.querySelector('.slides');
      const totalSlides = slides.children.length;
      currentSlide = (index + totalSlides) % totalSlides;
      slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    }

    function nextSlide() {
      showSlide(currentSlide + 1);
    }

    function prevSlide() {
      showSlide(currentSlide - 1);
    }

    setInterval(() => nextSlide(), 5000);
  </script>

  <script>
    function openCart() {
      document.getElementById("cart-overlay").style.right = "0";
      renderCartOverlay();
    }

    function closeCart() {
      document.getElementById("cart-overlay").style.right = "-100%";
    }

    function renderCartOverlay() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('cart-content');

      if (cart.length === 0) {
        container.innerHTML = "<p>Der Warenkorb ist leer.</p>";
        return;
      }

      let html = "<ul style='padding-left: 0; list-style: none'>";
      let total = 0;
      cart.forEach(item => {
        const itemTotal = item.quantity * item.price;
        total += itemTotal;
        html += `<li style='margin-bottom: 10px;'>
               <strong>${item.name}</strong><br>
               ${item.quantity} × ${item.price.toFixed(2)} € = ${itemTotal.toFixed(2)} €
             </li>`;
      });
      html += `</ul><p><strong>Gesamt: ${total.toFixed(2)} €</strong></p>`;
      container.innerHTML = html;
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
      const countSpans = document.querySelectorAll('#cart-count');
      countSpans.forEach(span => {
        if (totalCount > 0) {
          span.textContent = totalCount;
          span.style.display = 'inline-block';
        } else {
          span.style.display = 'none';
        }
      });
    }
    updateCartCount();
  </script>
  <script>
    const user = localStorage.getItem("currentUser");
    if (user) {
      document.write(`<p>Willkommen, ${user}!</p>`);
    }
  </script>

  <script>
    // Token aus localStorage holen und Seite neu laden mit Auth
    const token = localStorage.getItem('adminToken');
    if (!token) location.href = '06 Admin/adminlogin.html';

    fetch(location.pathname, {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(res => {
      if (!res.ok) throw new Error('Nicht autorisiert');
      return res.text();
    })
    .then(html => {
      document.open();
      document.write(html);
      document.close();
    })
    .catch(err => {
      alert('Zugriff verweigert – zurück zum Login');
      location.href = '06 Admin/adminlogin.html';
    });
  </script>
