<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Login & Registrierung</title>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

    const res = await fetch('https://threed-spiele-2.onrender.com/api/user/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: e.target.email.value,
        password: e.target.password.value
      })
    });

    let data;
    try {
      data = await res.json();
    } catch (err) {
      alert("Serverfehler – keine gültige Antwort");
      return;
    }

    if (!res.ok) {
      alert(data.message || "Fehler beim Login");
      return;
    }

    localStorage.setItem("token", data.token);
    alert("Login erfolgreich!");
    window.location.href = "/index.html";
  });
  </script>
</head>
<body>

  <h2>Login</h2>
  <form id="loginForm">
    <input type="email" name="email" placeholder="E-Mail" required />
    <input type="password" name="password" placeholder="Passwort" required />
    <button type="submit">Einloggen</button>
  </form>

  <p>Noch kein Konto? <a href="#" onclick="toggleForms()">Hier registrieren</a></p>

  <!-- REGISTRIERUNG -->
  <div id="registerSection" style="display:none;">
    <h2>Registrieren</h2>
    <form id="registerForm">
      <input type="text" name="name" placeholder="Name" required />
      <input type="email" name="email" placeholder="E-Mail" required />
      <input type="password" name="password" placeholder="Passwort" required />
      <button type="submit">Registrieren</button>
    </form>
  </div>

<script>
function toggleForms() {
  const reg = document.getElementById('registerSection');
  reg.style.display = reg.style.display === 'none' ? 'block' : 'none';
}

// LOGIN
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const res = await fetch('/api/user/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: e.target.email.value,
      password: e.target.password.value
    })
  });

  const data = await res.json();

  if (res.ok && data.token) {
    localStorage.setItem("token", data.token);
    alert("Login erfolgreich!");
    window.location.href = "/index.html";
  } else {
    alert(data.message || "Fehler beim Login");
  }
});

// REGISTRIERUNG
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const res = await fetch('/api/user/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: e.target.name.value,
      email: e.target.email.value,
      password: e.target.password.value
    })
  });

  const data = await res.json();
  alert(data.message);

  if (res.ok) {
    window.location.href = '/index.html';
  }
});
</script>

</body>
</html>
